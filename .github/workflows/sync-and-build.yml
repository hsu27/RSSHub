name: Sync and Build

on:
    schedule:
        - cron: '30 0 5,25 * *' # 每月 5 號與 25 號 00:30 UTC 自動跑
    workflow_dispatch: # 允許手動觸發

permissions:
    contents: write # 同步/推送 branch 需要
    packages: write # 推 image 到 ghcr 需要
    issues: write # 失敗時開 issue 需要

jobs:
    sync-and-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  # 注意：若有分支保護，建議將下方換成自訂的 PAT (Personal Access Token)
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Sync master with upstream
              run: |
                  # 確保本地有 master 與 my-routes 分支並與遠端同步
                  git checkout master || git checkout -b master origin/master
                  git remote add upstream https://github.com/DIYgod/RSSHub.git
                  git fetch upstream master
                  git merge --ff-only upstream/master
                  git push origin master

            - name: Merge master into my-routes
              id: merge
              run: |
                  git checkout my-routes || git checkout -b my-routes origin/my-routes
                  if ! git merge master --no-edit; then
                    git merge --abort
                    echo "conflict=true" >> "$GITHUB_OUTPUT"
                    echo "::error::Merge conflict when merging master into my-routes"
                    exit 1
                  fi
                  git push origin my-routes

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # 處理 GitHub 帳號包含大寫字母的情況，轉為小寫給 Docker 使用
            - name: Downcase repository owner
              id: repo_owner
              run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ghcr.io/${{ steps.repo_owner.outputs.owner }}/rsshub:latest

            - name: Open issue on failure
              if: failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      const conflict = '${{ steps.merge.outputs.conflict }}' === 'true';
                      const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
                      const title = conflict
                        ? '⚠️ Sync 失敗：master 合併進 my-routes 有衝突'
                        : '⚠️ Sync/Build workflow 失敗';
                      const body = [
                        conflict
                          ? '將 `master` 合併進 `my-routes` 時發生衝突，已自動 abort，請手動處理。'
                          : 'Sync/Build workflow 執行失敗，請查看 log。',
                        '',
                        conflict ? [
                          '手動處理步驟:',
                          '```bash',
                          'git checkout my-routes',
                          'git merge master',
                          '# 解決衝突後',
                          'git add -A && git commit',
                          'git push origin my-routes',
                          '```',
                        ].join('\n') : '',
                        '',
                        `執行紀錄: ${runUrl}`,
                      ].join('\n');

                      const { data: issues } = await github.rest.issues.listForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        state: 'open',
                        labels: ['sync-failure'], // 修正：API 帶入標籤需為陣列
                      });

                      if (issues.length > 0) {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: issues[0].number,
                          body,
                        });
                      } else {
                        await github.rest.issues.create({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          title,
                          body,
                          labels: ['sync-failure'],
                        });
                      }
